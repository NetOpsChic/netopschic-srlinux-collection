### REQUIRED
namespace: netopschic

name: srlinux

version: 0.0.1

readme: README.md

authors:
  - Roman Dodin (Original Creator)
  - Patrick Dumais (Original Creator)
  - Walter De Smedt (Original Creator)
  - Uzma Saman (@NetOpsChic) (Extended Version Maintainer)

### OPTIONAL
description: Community-maintained Ansible collection for Nokia SR Linux (Unofficial and Extended Version).

# Point this to the license in your repo
license_file: "LICENSE"

tags:
  - nokia
  - srlinux
  - containerlab
  - netops
  - networking

dependencies:
  "ansible.netcommon": ">=5.2.0,<=6.1.3"
  "ansible.utils": ">=3.0.0,<5.0.0"

repository: https://github.com/NetOpsChic/srlinux-ansible-collection
issues: https://github.com/NetOpsChic/srlinux-ansible-collection/issues

build_ignore:
  - example-scenarios
  - playbooks
  - scripts
  - run.sh
  - .github
  - .vscode
  - .venv
  - .env
  - .envrc
  - .gitignore
  - private
  - .dockerignore